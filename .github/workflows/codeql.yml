# CodeQL static analysis for JavaScript.
#
# Runs on every pull request, push to main, and weekly on Monday morning.
# ICCC is a public repository, so CodeQL is free; the upload to the security
# tab does not require GitHub Advanced Security.
#
# Security note: no untrusted GitHub context variables are used in any
# run step. The action invocations use only fixed inputs.
#
# Action versions are pinned to commit SHAs verified on 2026-05-30.

name: CodeQL
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly, Monday morning

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyse JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Initialise CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: javascript
      - name: Analyse
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
