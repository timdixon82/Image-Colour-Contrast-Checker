# Continuous integration for the ICCC Vite application.
#
# Runs on every pull request and on pushes to main. Lints HTML
# (HTMLHint), CSS (Stylelint), and JavaScript (ESLint). All three
# linters are pinned in package.json; CI installs them with npm ci
# from the committed package-lock.json. The build step runs after
# lint passes, verifying that the Vite build completes cleanly.
#
# Security note: no untrusted GitHub context variables are interpolated
# into any run step. All run commands are fixed strings.
#
# Action versions are pinned to commit SHAs verified on 2026-05-30.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint HTML, CSS, and JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JavaScript
        run: npm run lint:js

  build:
    name: Vite build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
