# Continuous integration for the ICCC Vite application.
#
# Runs on every pull request and on pushes to main. Lints HTML
# (HTMLHint), CSS (Stylelint), and JavaScript (ESLint). All three
# linters are pinned in package.json; CI installs them with npm ci
# from the committed package-lock.json. The build step runs after
# lint passes, verifying that the Vite build completes cleanly.
#
# Security note: no untrusted GitHub context variables are interpolated
# into any run step. All run commands are fixed strings.
#
# Action versions are pinned to commit SHAs verified on 2026-05-30.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint HTML, CSS, and JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JavaScript
        run: npm run lint:js

  build:
    name: Vite build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install veraPDF
        run: |
          curl -sSL https://software.verapdf.org/releases/1.30/verapdf-greenfield-1.30.1-installer.zip -o /tmp/verapdf.zip
          echo "379193c2292df68b2424d1d4e47ec09c0ba60644dce23c34a416a447f16ba367  /tmp/verapdf.zip" | sha256sum -c -
          unzip -q /tmp/verapdf.zip -d /tmp/verapdf-dist
          printf 'INSTALL_PATH=/opt/verapdf\n' > /tmp/verapdf.options
          java -jar /tmp/verapdf-dist/verapdf-greenfield-1.30.1/verapdf-izpack-installer-1.30.1.jar -options /tmp/verapdf.options
          echo "VERAPDF_PATH=/opt/verapdf/verapdf" >> $GITHUB_ENV

      - name: Run Vitest tests (veraPDF PDF/UA-1 compliance)
        run: npm test
