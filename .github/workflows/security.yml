# Security checks: Semgrep, Trivy, and dependency review.
#
# Runs on every pull request and weekly on Monday morning. dependency-review
# runs only on pull requests. ICCC is a public repository, so dependency-review
# is free; it does not require GitHub Advanced Security.
#
# Security note: no untrusted GitHub context variables are used in any run step.
#
# Action versions are pinned to commit SHAs verified on 2026-05-30.

name: Security
on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # weekly, Monday morning

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Semgrep
        # semgrep scan runs locally with the default ruleset and exits non-zero
        # on any finding. semgrep ci requires a SEMGREP_APP_TOKEN and uses
        # cloud-based CI mode; it is not used here to avoid token dependency.
        run: |
          pip install semgrep
          semgrep scan --config p/default --error

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
